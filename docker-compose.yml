version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smart_attendance_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    container_name: smart_attendance_backend
    restart: always
    env_file:
      - .env
    environment:
      - TF_CPP_MIN_LOG_LEVEL=3
      - TF_ENABLE_ONEDNN_OPTS=0
      - TF_CPP_MAX_VLOG_LEVEL=-1
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
    depends_on:
      - db
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
    container_name: smart_attendance_frontend
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: smart_attendance_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
